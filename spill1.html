<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Samtykkespill 2D</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #eef2f5;
    display: flex;
}

/* -------- STARTSKJERM -------- */
#startScreen {
    position: fixed;
    inset: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.dinoSelect {
    display: flex;
    gap: 40px;
    margin: 20px;
}

.dino {
    font-size: 60px;
    cursor: pointer;
    padding: 10px;
    border: 3px solid transparent;
    animation: bounce 1.5s infinite;
}

.dino.selected {
    border-color: green;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

#startBtn {
    font-size: 22px;
    padding: 15px 40px;
}

/* -------- SPILL -------- */
#gameContainer {
    padding: 10px;
}

canvas {
    background: #dff1ff;
    border: 2px solid #333;
}

/* -------- SIDE -------- */
#sidePanel {
    width: 300px;
    padding: 10px;
    background: #ffffff;
    border-left: 2px solid #333;
}

h2, h3 {
    margin-top: 5px;
}

.shopItem {
    font-size: 24px;
    cursor: pointer;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
